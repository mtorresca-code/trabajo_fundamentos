class Usuario {
    constructor(nombre, email, password) {
        this.nombre = nombre; this.email = email; this.password = password;
    }
}

class Socio {
    constructor(id, nombre, email, telefono) {
        this.id = id; this.nombre = nombre; this.email = email; this.telefono = telefono;
    }
    getIdentificacion() { return `${this.nombre} (ID: ${this.id})`; }
}

class RecursoBase {
    constructor(id, titulo, autor, categoria) {
        this.id = id; this.titulo = titulo; this.autor = autor; this.categoria = categoria; this.estado = "disponible";
    }
    getDescripcion() { return `${this.titulo} de ${this.autor}`; }
}

class DecoradorDRM extends RecursoBase {
    constructor(recurso) {
        super(recurso.id, resourceTitle(recurso), resourceAuthor(recurso), resourceCategory(recurso));
        this.recurso = resourceUnderlying(recurso);
    }
    getDescripcion() { return `${this.recurso.getDescripcion()} [PROTEGIDO DIGITAL DRM]`; }
}
function resourceTitle(r){ return r.titulo; } function resourceAuthor(r){ return r.autor; } function resourceCategory(r){ return r.categoria; } function resourceUnderlying(r){ return r.recurso || r; }

class DecoradorSoloReferencia extends RecursoBase {
    constructor(recurso) {
        super(recurso.id, resourceTitle(recurso), resourceAuthor(recurso), resourceCategory(recurso));
        this.recurso = resourceUnderlying(recurso);
    }
    getDescripcion() { return `${this.recurso.getDescripcion()} [SOLO REFERENCIA]`; }
}

class FactoryRecursosAcademicos {
    static crear(id, tipo, titulo, autor, categoria) {
        let recurso = new RecursoBase(id, titulo, autor, categoria);
        if (tipo === 'digital') return new DecoradorDRM(recurso);
        if (tipo === 'revista') return new DecoradorSoloReferencia(recurso);
        return recurso;
    }
}

const EstrategiasBusqueda = {
    titulo: (c, lista) => lista.filter(r => r.titulo.toLowerCase().includes(c.toLowerCase())),
    autor: (c, lista) => lista.filter(r => r.autor.toLowerCase().includes(c.toLowerCase())),
    categoria: (c, lista) => lista.filter(r => r.categoria.toLowerCase().includes(c.toLowerCase())),
    disponibilidad: (c, lista) => lista.filter(r => r.estado.toLowerCase() === c.toLowerCase())
};

class CommandTracker {
    constructor() { this.historial = []; }
    ejecutar(command) {
        command.ejecutar();
        this.historial.push(command);
    }
    deshacer() {
        if (this.historial.length === 0) return false;
        const command = this.historial.pop();
        command.deshacer();
        return true;
    }
}

class PrestamoCommand {
    constructor(recurso, socio) { this.recurso = recurso; this.socio = socio; }
    ejecutar() { this.recurso.estado = "prestado"; }
    deshacer() { this.recurso.estado = "disponible"; }
}

class ReporteTemplate {
    generar(recursos, socios) {
        let out = "=========================================================\n";
        out += "     UNIVERSIDAD LA SALLE - REPORTE DE AUDITORÍA SGB     \n";
        out += "=========================================================\n";
        out += this.generarCuerpo(recursos, socios);
        out += "\n=========================================================\n";
        out += `Generado el: ${new Date().toLocaleDateString()} a las ${new Date().toLocaleTimeString()} | Fin del Reporte`;
        return out;
    }
    generarCuerpo(recursos, socios) { throw new Error("Método abstracto"); }
}

class ReporteCompletoSGB extends ReporteTemplate {
    generarCuerpo(recursos, socios) {
        let res = `Resumen General: Recursos en Catálogo: ${recursos.length} | Socios Inscritos: ${socios.length}\n\n`;
        res += "--- INVENTARIO DE RECURSOS ---\n";
        if(recursos.length === 0) res += "(Catálogo Vacío)\n";
        else res += recursos.map(r => `• [${r.estado.toUpperCase()}] ID: ${r.id} -> ${r.getDescripcion()} (${r.categoria})`).join("\n") + "\n";
        
        res += "\n--- PADRÓN DE SOCIOS AFILIADOS ---\n";
        if(socios.length === 0) res += "(No hay socios registrados)\n";
        else res += socios.map(s => `• ID: ${s.id} -> ${s.nombre} | Contacto: ${s.email} / ${s.telefono}`).join("\n");
        return res;
    }
}

/**
 * ============================================================================
 * 3. CAPA DE APLICACIÓN (Facade, Singleton & Observer)
 * ============================================================================
 */
class CanalNotificacion {
    constructor(nombre, facade) { this.nombre = nombre; this.facade = facade; }
    notificar(msg, emailDestino = null) {
        const log = document.getElementById('consolaNotificaciones');
        if(log) {
            log.innerHTML += `> [${this.nombre.toUpperCase()}]: ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        }
    }
}

class CanalEmailReal extends CanalNotificacion {
    notificar(msg, emailDestino = null) {
        super.notificar(msg);
        let targetEmail = emailDestino;
        if (msg.includes("[PRESTADO]") && !targetEmail) {
            targetEmail = this.facade.obtenerUltimoSocioEmail();
        }
        if(targetEmail && this.facade.EMAILJS_PUBLIC_KEY !== "") {
            const params = { to_email: targetEmail, subject: "Alerta Institucional SGB", message: msg, from_email: this.facade.getRemitenteActual() };
            emailjs.send(this.facade.EMAILJS_SERVICE_ID, this.facade.EMAILJS_TEMPLATE_ID, params).catch(e => console.log("EmailJS inactivo"));
        }
    }
}

class BibliotecaCore {
    constructor() {
        if (BibliotecaCore.instance) return BibliotecaCore.instance;
        
        // Inicializa el catálogo si localStorage está vacío antes de recuperarlo
        JSONRepository.inicializarCatalogoPredeterminado();

        this.recursos = JSONRepository.recuperar("sgb_recursos").map(r => FactoryRecursosAcademicos.crear(r.id, r.tipo || 'fisico', r.titulo, r.autor, r.categoria));
        const estados = JSONRepository.recuperar("sgb_estados") || [];
        this.recursos.forEach((r, i) => { if(estados[i]) r.estado = estados[i]; });

        this.socios = (JSONRepository.recuperar("sgb_socios") || []).map(s => new Socio(s.id, s.nombre, s.email, s.telefono));
        this.usuarios = JSONRepository.recuperar("sgb_usuarios") || [];
        this.operadorActivo = null;
        this.ultimoSocioAfectado = null;
        this.observadores = [];
        this.commandTracker = new CommandTracker();
        BibliotecaCore.instance = this;
    }

    registrarObservador(obs) { this.observadores.push(obs); }
    notificarTodos(msg, emailDestino = null) { this.observadores.forEach(o => o.notificar(msg, emailDestino)); }
    
    guardarCambios() {
        JSONRepository.guardar("sgb_recursos", this.recursos);
        JSONRepository.guardar("sgb_socios", this.socios);
        JSONRepository.guardar("sgb_usuarios", this.usuarios);
        JSONRepository.guardar("sgb_estados", this.recursos.map(r => r.estado));
    }
}

class BibliotecaFacade {
    constructor() {
        this.core = new BibliotecaCore();
        this.EMAILJS_SERVICE_ID = "service_an7s6uy";
        this.EMAILJS_TEMPLATE_ID = "template_ecaovha";
        this.EMAILJS_PUBLIC_KEY = "97W3qOBeyptTNHTcO";
        if(typeof emailjs !== 'undefined') emailjs.init({ publicKey: this.EMAILJS_PUBLIC_KEY });

        this.core.registrarObservador(new CanalEmailReal("Email Gateway", this));
        this.core.registrarObservador(new CanalNotificacion("SMS Gateway", this));
    }

    registrarUsuario(n, e, p) {
        this.core.usuarios.push(new Usuario(n, e, p));
        this.core.guardarCambios();
        this.core.notificarTodos(`[SEGURIDAD] Cuenta dada de alta para: ${e}`);
    }

    login(e, p) {
        const u = this.core.usuarios.find(user => user.email === e && user.password === p);
        if(u) { this.core.operadorActivo = u; this.core.notificarTodos(`[SESIÓN] El bibliotecario ${u.nombre} tomó el control.`); return true; }
        return false;
    }

    getRemitenteActual() { return this.core.operadorActivo ? this.core.operadorActivo.email : "anonimo@lasalle.edu"; }
    obtenerUltimoSocioEmail() { return this.core.ultimoSocioAfectado ? this.core.ultimoSocioAfectado.email : null; }

    registrarRecurso(tipo, t, a, c) {
        const id = "R-" + (this.core.recursos.length + 101);
        const nuevo = FactoryRecursosAcademicos.crear(id, tipo, t, a, c);
        nuevo.tipo = tipo;
        this.core.recursos.push(nuevo);
        this.core.guardarCambios();
        this.core.notificarTodos(`[INVENTARIO] Registrado: ${nuevo.getDescripcion()}`);
    }

    eliminarRecurso(idRecurso) {
        const index = this.core.recursos.findIndex(r => r.id === idRecurso);
        if(index !== -1) {
            const desc = this.core.recursos[index].getDescripcion();
            this.core.recursos.splice(index, 1);
            this.core.guardarCambios();
            this.core.notificarTodos(`[ELIMINACIÓN] Removido recurso del catálogo: "${desc}"`);
            return true;
        }
        return false;
    }

    registrarContacto(n, e, t) {
        const id = "S-" + (this.core.socios.length + 501);
        const nuevo = new Socio(id, n, e, t);
        this.core.socios.push(nuevo);
        this.core.guardarCambios();
        this.core.notificarTodos(`[SOCIOS] Nuevo socio activo: ${nuevo.getIdentificacion()}`);
    }

    eliminarSocio(idSocio) {
        const index = this.core.socios.findIndex(s => s.id === idSocio);
        if(index !== -1) {
            const nombre = this.core.socios[index].nombre;
            this.core.socios.splice(index, 1);
            this.core.guardarCambios();
            this.core.notificarTodos(`[ELIMINACIÓN] Socio dado de baja del sistema: ${nombre}`);
            return true;
        }
        return false;
    }

    efectuarPrestamo(idRecurso, idSocio) {
        const rec = this.core.recursos.find(r => r.id === idRecurso);
        const soc = this.core.socios.find(s => s.id === idSocio);
        if(rec && rec.estado === "disponible") {
            this.core.ultimoSocioAfectado = soc;
            const cmd = new PrestamoCommand(rec, soc);
            this.core.commandTracker.ejecutar(cmd);
            this.core.guardarCambios();
            this.core.notificarTodos(`[PRESTADO] El recurso "${rec.getDescripcion()}" fue asignado a ${soc.nombre}`);
            return true;
        }
        return false;
    }

    deshacerPrestamo() {
        if(this.core.commandTracker.deshacer()) {
            this.core.guardarCambios();
            this.core.notificarTodos(`[DESHACER] Se revocó el préstamo de forma segura.`);
            return true;
        }
        return false;
    }

    enviarNotificacionManual(idSocio, asunto, cuerpo) {
        const soc = this.core.socios.find(s => s.id === idSocio);
        if(soc) { this.core.notificarTodos(`[MANUAL] ${asunto}: ${cuerpo}`, soc.email); return true; }
        return false;
    }

    buscar(est, cri) { return EstrategiasBusqueda[est](cri, this.core.recursos); }
    ejecutarReporte() { return new ReporteCompletoSGB().generar(this.core.recursos, this.core.socios); }
}

const biblioteca = new BibliotecaFacade();

/**
 * ============================================================================
 * 4. CAPA DE PRESENTACIÓN (UI)
 * ============================================================================
 */
function actualizarTablasUI() {
    const tbody = document.querySelector("#tablaInventario tbody");
    const tbodySocios = document.querySelector("#tablaSocios tbody");
    const selRecurso = document.getElementById("loanRecurso");
    const selSocio = document.getElementById("loanSocio");
    const selSocioMsg = document.getElementById("msgSocioDestino");
    
    tbody.innerHTML = ""; tbodySocios.innerHTML = ""; selRecurso.innerHTML = ""; selSocio.innerHTML = ""; selSocioMsg.innerHTML = "";

    // Render Catálogo
    biblioteca.core.recursos.forEach(r => {
        tbody.innerHTML += `<tr>
            <td>${r.id}</td>
            <td>${r.getDescripcion()}</td>
            <td>${r.categoria}</td>
            <td style="color:${r.estado==='disponible'?'#48bb78':'#ff4d6d'}; font-weight:bold;">${r.estado.toUpperCase()}</td>
            <td>
                <button class="secondary" style="padding:2px 6px; font-size:11px;" onclick="uiDevolverDirecto('${r.id}')" ${r.estado==='disponible'?'disabled':''}>Devolver</button>
                <button class="danger" style="padding:2px 6px; font-size:11px; margin-left:4px;" onclick="uiEliminarRecurso('${r.id}')">Eliminar</button>
            </td>
        </tr>`;
        if(r.estado === "disponible") {
            const opt = document.createElement("option"); opt.value = r.id; opt.textContent = r.getDescripcion();
            selRecurso.appendChild(opt);
        }
    });

    // Render Socios
    biblioteca.core.socios.forEach(s => {
        tbodySocios.innerHTML += `<tr>
            <td>${s.id}</td>
            <td>${s.nombre}</td>
            <td>${s.email}</td>
            <td>${s.telefono}</td>
            <td>
                <button class="danger" style="padding:2px 6px; font-size:11px;" onclick="uiEliminarSocio('${s.id}')">Dar de Baja</button>
            </td>
        </tr>`;

        const opt1 = document.createElement("option"); opt1.value = s.id; opt1.textContent = s.getIdentificacion();
        selSocio.appendChild(opt1);
        
        const opt2 = document.createElement("option"); opt2.value = s.id; opt2.textContent = `${s.nombre} (${s.email})`;
        selSocioMsg.appendChild(opt2);
    });
}

function uiRegistrarUsuario() {
    const n = document.getElementById('regUsuario').value; const e = document.getElementById('regEmail').value; const p = document.getElementById('regPassword').value;
    if(!n || !e || !p) return alert("Complete los campos.");
    biblioteca.registrarUsuario(n, e, p); alert("¡Bibliotecario Creado!");
}

function uiIniciarSesion() {
    if(biblioteca.login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)) {
        document.getElementById('authSection').style.display = 'none'; document.getElementById('appContent').style.display = 'block';
        document.getElementById('sessionBadge').innerText = biblioteca.getRemitenteActual();
        actualizarTablasUI();
    } else { alert("Credenciales Inválidas."); }
}

function uiCerrarSesion() { location.reload(); }

function uiRegistrarRecurso() {
    biblioteca.registrarRecurso(document.getElementById('tipoRecurso').value, document.getElementById('titulo').value, document.getElementById('autor').value, document.getElementById('categoria').value);
    actualizarTablasUI();
    document.getElementById('titulo').value = ''; document.getElementById('autor').value = '';
}

function uiEliminarRecurso(id) {
    if(confirm("¿Seguro que deseas eliminar este recurso de forma permanente del catálogo?")) {
        if(biblioteca.eliminarRecurso(id)) actualizarTablasUI();
    }
}

function uiRegistrarContacto() {
    biblioteca.registrarContacto(document.getElementById('nombreContacto').value, document.getElementById('emailContacto').value, document.getElementById('telefonoContacto').value);
    actualizarTablasUI();
    document.getElementById('nombreContacto').value = ''; document.getElementById('emailContacto').value = ''; document.getElementById('telefonoContacto').value = '';
}

function uiEliminarSocio(id) {
    if(confirm("¿Seguro que deseas dar de baja a este socio del sistema?")) {
        if(biblioteca.eliminarSocio(id)) actualizarTablasUI();
    }
}

function uiEfectuarPrestamo() {
    if(biblioteca.efectuarPrestamo(document.getElementById("loanRecurso").value, document.getElementById("loanSocio").value)) actualizarTablasUI();
}

function uiDeshacerPrestamo() { if(biblioteca.deshacerPrestamo()) actualizarTablasUI(); }

function uiDevolverDirecto(id) {
    const rec = biblioteca.core.recursos.find(r => r.id === id);
    if(rec) {
        rec.estado = "disponible"; biblioteca.core.guardarCambios();
        biblioteca.core.notificarTodos(`[DEVOLUCIÓN] El recurso "${rec.getDescripcion()}" volvió.`);
        actualizarTablasUI();
    }
}

function uiEnviarMensajeManual() {
    if(biblioteca.enviarNotificacionManual(document.getElementById("msgSocioDestino").value, document.getElementById("msgAsunto").value, document.getElementById("msgCuerpo").value)) {
        alert("Mensaje enviado con éxito."); document.getElementById("msgAsunto").value = ""; document.getElementById("msgCuerpo").value = "";
    }
}

function uiBuscar() {
    const res = biblioteca.buscar(document.getElementById('estrategiaBusqueda').value, document.getElementById('inputBusqueda').value);
    document.getElementById('resultadosBusqueda').innerHTML = res.length ? res.map(r => `<p> [${r.estado.toUpperCase()}] <strong>${r.getDescripcion()}</strong></p>`).join("") : "<p>Sin resultados.</p>";
}

function uiGenerarReporte() { document.getElementById('areaReporte').innerText = biblioteca.ejecutarReporte(); }

function uiDescargarReporteTXT() {
    const textoReporte = biblioteca.ejecutarReporte();
    const blob = new Blob([textoReporte], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `Reporte_SGB_LaSalle_${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    biblioteca.core.notificarTodos("[REPORTE] Se exportó con éxito el archivo estructurado .txt al disco local.");
}
</script>
